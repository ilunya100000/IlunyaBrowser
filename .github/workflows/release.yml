name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python make_icon.py

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --windowed --name IlunyaBrowser --icon assets\icon.ico --add-data "assets\icon.ico;assets" ilunya_browser.py

      - name: Publish Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IlunyaBrowser.exe
          generate_release_notes: true
          body: |
            ## Windows
            Download **IlunyaBrowser.exe** below and run it.

            ## Debian / Ubuntu
            ```bash
            sudo apt install ./ilunyabrowser_*_all.deb
            ```

            ## Arch Linux
            ```bash
            yay -S ilunyabrowser
            ```
            AUR: https://aur.archlinux.org/packages/ilunyabrowser

  build-debian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper-compat python3-all

      - name: Build .deb package
        run: |
          chmod +x packaging/debian/build-deb.sh
          ./packaging/debian/build-deb.sh

      - name: Publish Debian release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ../ilunyabrowser_*_all.deb
