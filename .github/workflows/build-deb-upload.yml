name: Build and upload Debian package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper-compat python3-all build-essential

      - name: Build .deb package
        run: |
          chmod +x packaging/debian/build-deb.sh
          ./packaging/debian/build-deb.sh
          ls -la ../*.deb

      - name: Upload to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$(gh release view --json tagName -q .tagName)" ../*.deb --clobber
